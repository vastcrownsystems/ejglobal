<!-- apps/pos/templates/pos/partials/hold_order_modal.html -->
<!-- Hold Order Modal - Add to POS template -->

<div id="holdOrderModal" class="modal" style="display: none;">
    <div class="modal-overlay" onclick="closeHoldModal()"></div>
    <div class="modal-content">
        <div class="modal-header">
            <h2>
                <i class="fas fa-pause-circle"></i>
                Hold Current Order
            </h2>
            <button class="modal-close" onclick="closeHoldModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form method="post" action="{% url 'orders:hold_order' %}" class="modal-body">
            {% csrf_token %}

            <div class="form-group">
                <label>Customer Name (Optional)</label>
                <input
                    type="text"
                    name="customer_name"
                    class="form-input"
                    placeholder="Enter customer name..."
                    autocomplete="off"
                >
                <div class="form-help">
                    Add a name to easily identify this order later
                </div>
            </div>

            <div class="form-group">
                <label>Notes (Optional)</label>
                <textarea
                    name="notes"
                    class="form-textarea"
                    rows="3"
                    placeholder="Add notes about this order..."
                ></textarea>
                <div class="form-help">
                    e.g., "Customer will return in 30 mins", "Waiting for payment"
                </div>
            </div>

            <div class="modal-actions">
                <button type="submit" class="btn-hold">
                    <i class="fas fa-check-circle"></i>
                    Hold Order
                </button>
                <button type="button" class="btn-cancel" onclick="closeHoldModal()">
                    Cancel
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Hold Button (Add to cart section in POS) -->
<button
    class="btn-hold-order"
    onclick="openHoldModal()"
    {% if not order or order.item_count == 0 %}disabled{% endif %}
>
    <i class="fas fa-pause-circle"></i>
    Hold Order
</button>

<!-- Drafts Link (Add to POS header or sidebar) -->
<a href="{% url 'orders:drafts_list' %}" class="btn-drafts">
    <i class="fas fa-clipboard-list"></i>
    Held Orders
    {% if held_count > 0 %}
        <span class="badge">{{ held_count }}</span>
    {% endif %}
</a>

<style>
    /* Modal */
    .modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .modal-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(4px);
    }

    .modal-content {
        position: relative;
        background: white;
        border-radius: 16px;
        width: 90%;
        max-width: 500px;
        max-height: 90vh;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        animation: modalSlideIn 0.3s ease;
    }

    @keyframes modalSlideIn {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .modal-header {
        padding: 1.5rem;
        border-bottom: 2px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .modal-header h2 {
        margin: 0;
        font-size: 1.25rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .modal-close {
        width: 36px;
        height: 36px;
        border: none;
        background: var(--bg-main);
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        transition: all 0.2s ease;
    }

    .modal-close:hover {
        background: var(--border);
        color: var(--text-primary);
    }

    .modal-body {
        padding: 2rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: var(--text-primary);
    }

    .form-input,
    .form-textarea {
        width: 100%;
        padding: 0.875rem 1rem;
        border: 2px solid var(--border);
        border-radius: 10px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.95rem;
    }

    .form-input:focus,
    .form-textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(0, 51, 160, 0.1);
    }

    .form-help {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-top: 0.5rem;
    }

    .modal-actions {
        display: flex;
        gap: 1rem;
        padding-top: 1.5rem;
        border-top: 2px solid var(--border);
    }

    .btn-hold {
        flex: 1;
        padding: 1rem 2rem;
        background: linear-gradient(135deg, var(--accent-orange) 0%, #D68400 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
    }

    .btn-hold:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(255, 140, 0, 0.3);
    }

    .btn-cancel {
        padding: 1rem 2rem;
        background: white;
        color: var(--text-secondary);
        border: 2px solid var(--border);
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
    }

    .btn-cancel:hover {
        background: var(--bg-main);
    }

    /* Hold Order Button (in cart) */
    .btn-hold-order {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, var(--accent-orange) 0%, #D68400 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-bottom: 0.75rem;
    }

    .btn-hold-order:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(255, 140, 0, 0.3);
    }

    .btn-hold-order:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    /* Drafts Link Button */
    .btn-drafts {
        padding: 0.75rem 1.5rem;
        background: white;
        color: var(--primary);
        border: 2px solid var(--border);
        border-radius: 10px;
        font-weight: 600;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        position: relative;
    }

    .btn-drafts:hover {
        border-color: var(--primary);
        background: rgba(0, 51, 160, 0.05);
    }

    .btn-drafts .badge {
        background: var(--danger);
        color: white;
        padding: 0.25rem 0.5rem;
        border-radius: 10px;
        font-size: 0.75rem;
        font-weight: 700;
    }
</style>

<script>
    function openHoldModal() {
        document.getElementById('holdOrderModal').style.display = 'flex';
    }

    function closeHoldModal() {
        document.getElementById('holdOrderModal').style.display = 'none';
    }

    // Close modal on Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeHoldModal();
        }
    });
</script>
