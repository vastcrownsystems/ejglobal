<!-- apps/orders/templates/orders/partials/hold_order_modal.html -->

<div id="holdOrderModal" class="hold-modal" style="display: none;">
    <div class="hold-modal-overlay" onclick="closeHoldModal()"></div>
    <div class="hold-modal-content">
        <div class="hold-modal-header">
            <h2>
                <i class="fas fa-pause-circle"></i>
                Hold Current Order
            </h2>
            <button class="hold-modal-close" onclick="closeHoldModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form method="post" action="{% url 'orders:hold_order' %}" class="hold-modal-body">
            {% csrf_token %}

            <div class="hold-form-group">
                <label>Customer Name (Optional)</label>
                <input
                    type="text"
                    name="customer_name"
                    class="hold-form-input"
                    placeholder="Enter customer name..."
                    autocomplete="off"
                >
                <div class="hold-form-help">
                    Add a name to easily identify this order later
                </div>
            </div>

            <div class="hold-form-group">
                <label>Notes (Optional)</label>
                <textarea
                    name="notes"
                    class="hold-form-textarea"
                    rows="3"
                    placeholder="Add notes about this order..."
                ></textarea>
                <div class="hold-form-help">
                    e.g., "Customer will return in 30 mins", "Waiting for payment"
                </div>
            </div>

            <div class="hold-modal-actions">
                <button type="submit" class="hold-btn-submit">
                    <i class="fas fa-check-circle"></i>
                    Hold Order
                </button>
                <button type="button" class="hold-btn-cancel" onclick="closeHoldModal()">
                    Cancel
                </button>
            </div>
        </form>
    </div>
</div>

<style>
    /* Hold Modal Styles */
    .hold-modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .hold-modal-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(4px);
    }

    .hold-modal-content {
        position: relative;
        background: white;
        border-radius: 16px;
        width: 90%;
        max-width: 500px;
        max-height: 90vh;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        animation: holdModalSlideIn 0.3s ease;
    }

    @keyframes holdModalSlideIn {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .hold-modal-header {
        padding: 1.5rem;
        border-bottom: 2px solid var(--border, #e4e7ed);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .hold-modal-header h2 {
        margin: 0;
        font-size: 1.25rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: var(--text-primary, #1A1F36);
    }

    .hold-modal-close {
        width: 36px;
        height: 36px;
        border: none;
        background: var(--bg-main, #F8F9FC);
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted, #718096);
        transition: all 0.2s ease;
    }

    .hold-modal-close:hover {
        background: var(--border, #e4e7ed);
        color: var(--text-primary, #1A1F36);
    }

    .hold-modal-body {
        padding: 2rem;
    }

    .hold-form-group {
        margin-bottom: 1.5rem;
    }

    .hold-form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: var(--text-primary, #1A1F36);
        font-size: 0.95rem;
    }

    .hold-form-input,
    .hold-form-textarea {
        width: 100%;
        padding: 0.875rem 1rem;
        border: 2px solid var(--border, #e4e7ed);
        border-radius: 10px;
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 0.95rem;
        transition: all 0.2s ease;
    }

    .hold-form-input:focus,
    .hold-form-textarea:focus {
        outline: none;
        border-color: var(--primary, #0033A0);
        box-shadow: 0 0 0 4px rgba(0, 51, 160, 0.1);
    }

    .hold-form-help {
        font-size: 0.85rem;
        color: var(--text-muted, #718096);
        margin-top: 0.5rem;
    }

    .hold-modal-actions {
        display: flex;
        gap: 1rem;
        padding-top: 1.5rem;
        border-top: 2px solid var(--border, #e4e7ed);
    }

    .hold-btn-submit {
        flex: 1;
        padding: 1rem 2rem;
        background: linear-gradient(135deg, var(--accent-orange, #FF8C00) 0%, #D68400 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        transition: all 0.2s ease;
        font-size: 0.95rem;
    }

    .hold-btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(255, 140, 0, 0.3);
    }

    .hold-btn-cancel {
        padding: 1rem 2rem;
        background: white;
        color: var(--text-secondary, #4A5568);
        border: 2px solid var(--border, #e4e7ed);
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .hold-btn-cancel:hover {
        background: var(--bg-main, #F8F9FC);
    }
</style>

<script>
    function openHoldModal() {
        document.getElementById('holdOrderModal').style.display = 'flex';
    }

    function closeHoldModal() {
        document.getElementById('holdOrderModal').style.display = 'none';
    }

    // Close modal on Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeHoldModal();
        }
    });
</script>
