<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Set New Password</title>
</head>
<body>
    <div style="max-width: 500px; margin: 50px auto;">
        <h2>Set New Password</h2>

        {% if validlink %}
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Change Password</button>
            </form>
        {% else %}
            <p>This password reset link is invalid or has expired.</p>
        {% endif %}
    </div>
</body>
</html>
