<!-- apps/customers/templates/customers/customer_search_modal.html -->
<!-- Customer Search/Quick Add Modal for POS -->

<div class="customer-modal-overlay" id="customerModal" onclick="closeCustomerModal()">
    <div class="customer-modal" onclick="event.stopPropagation()">
        <!-- Modal Header -->
        <div class="modal-header">
            <h2>
                <i class="fas fa-user-plus"></i>
                Add Customer
            </h2>
            <button class="btn-close" onclick="closeCustomerModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- Tab Navigation -->
        <div class="tab-nav">
            <button class="tab-btn active" onclick="showTab('search')">
                <i class="fas fa-search"></i>
                Search Existing
            </button>
            <button class="tab-btn" onclick="showTab('quick')">
                <i class="fas fa-plus-circle"></i>
                Quick Add
            </button>
            <button class="tab-btn" onclick="showTab('skip')">
                <i class="fas fa-user-slash"></i>
                Skip (Walk-in)
            </button>
        </div>

        <!-- Tab: Search Existing Customer -->
        <div class="tab-content active" id="searchTab">
            <div class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input
                        type="text"
                        id="customerSearch"
                        placeholder="Search by name, phone, or customer number..."
                        hx-get="{% url 'customers:customer_search' %}"
                        hx-trigger="keyup changed delay:300ms"
                        hx-target="#searchResults"
                        hx-include="this"
                        name="q"
                    >
                </div>

                <div id="searchResults" class="search-results">
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <p>Start typing to search customers...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab: Quick Add Customer -->
        <div class="tab-content" id="quickTab">
            <form
                id="quickAddForm"
                hx-post="{% url 'customers:quick_add' %}"
                hx-target="#customerModal"
                hx-swap="outerHTML"
            >
                {% csrf_token %}

                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="name">Customer Name *</label>
                        <input
                            type="text"
                            name="name"
                            id="name"
                            class="form-input"
                            required
                            placeholder="Full Name"
                        >
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input
                            type="tel"
                            name="phone"
                            id="phone"
                            class="form-input"
                            placeholder="+234-XXX-XXX-XXXX"
                        >
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input
                            type="email"
                            name="email"
                            id="email"
                            class="form-input"
                            placeholder="customer@example.com"
                        >
                    </div>

                    <div class="form-group full-width">
                        <label for="customer_type">Customer Type</label>
                        <select name="customer_type" id="customer_type" class="form-select">
                            <option value="INDIVIDUAL">Individual</option>
                            <option value="BUSINESS">Business/Corporate</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label for="notes">Notes (Optional)</label>
                        <textarea
                            name="notes"
                            id="notes"
                            class="form-textarea"
                            rows="2"
                            placeholder="Additional information..."
                        ></textarea>
                    </div>
                </div>

                <button type="submit" class="btn-primary full-width">
                    <i class="fas fa-save"></i>
                    Save Customer & Continue
                </button>
            </form>
        </div>

        <!-- Tab: Skip (Walk-in Customer) -->
        <div class="tab-content" id="skipTab">
            <div class="walk-in-section">
                <div class="walk-in-icon">
                    <i class="fas fa-walking"></i>
                </div>
                <h3>Walk-in Customer</h3>
                <p>Proceed without customer information</p>

                <form
                    hx-post="{% url 'customers:skip_customer' %}"
                    hx-target="#customerModal"
                    hx-swap="outerHTML"
                >
                    {% csrf_token %}

                    <!-- Optional: Quick name for reference -->
                    <div class="form-group">
                        <label for="walk_in_name">Reference Name (Optional)</label>
                        <input
                            type="text"
                            name="walk_in_name"
                            id="walk_in_name"
                            class="form-input"
                            placeholder="e.g., 'Man in blue shirt' (internal reference)"
                        >
                        <small class="form-hint">For your reference only, not stored in customer database</small>
                    </div>

                    <button type="submit" class="btn-secondary full-width">
                        <i class="fas fa-arrow-right"></i>
                        Continue Without Customer
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    /* Modal Overlay */
    .customer-modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(4px);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.2s ease;
    }

    /* Modal */
    .customer-modal {
        background: white;
        border-radius: 16px;
        width: 90%;
        max-width: 600px;
        max-height: 85vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        animation: slideUp 0.3s ease;
    }

    /* Modal Header */
    .modal-header {
        padding: 1.5rem 2rem;
        border-bottom: 2px solid #E8E8E8;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .modal-header h2 {
        margin: 0;
        font-size: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .btn-close {
        width: 36px;
        height: 36px;
        background: #F5F5F5;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
    }

    .btn-close:hover {
        background: #E8E8E8;
    }

    /* Tab Navigation */
    .tab-nav {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1px;
        background: #E8E8E8;
        border-bottom: 1px solid #E8E8E8;
    }

    .tab-btn {
        padding: 1rem;
        background: white;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        font-weight: 600;
        color: #666;
        transition: all 0.2s ease;
    }

    .tab-btn:hover {
        background: #FAFAFA;
    }

    .tab-btn.active {
        background: #0033A0;
        color: white;
    }

    /* Tab Content */
    .tab-content {
        display: none;
        padding: 2rem;
        flex: 1;
        overflow-y: auto;
    }

    .tab-content.active {
        display: block;
    }

    /* Search Section */
    .search-box {
        position: relative;
        margin-bottom: 1.5rem;
    }

    .search-box i {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #999;
    }

    .search-box input {
        width: 100%;
        padding: 0.875rem 1rem 0.875rem 3rem;
        border: 2px solid #E8E8E8;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.2s ease;
    }

    .search-box input:focus {
        outline: none;
        border-color: #0033A0;
    }

    /* Search Results */
    .search-results {
        max-height: 400px;
        overflow-y: auto;
    }

    .empty-state {
        text-align: center;
        padding: 3rem 1.5rem;
        color: #999;
    }

    .empty-state i {
        font-size: 3rem;
        margin-bottom: 1rem;
        opacity: 0.3;
    }

    .customer-result {
        padding: 1rem;
        border: 1px solid #E8E8E8;
        border-radius: 8px;
        margin-bottom: 0.75rem;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .customer-result:hover {
        border-color: #0033A0;
        background: #F7FAFC;
    }

    .customer-info {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
    }

    .customer-name {
        font-weight: 700;
        color: #1A1A1A;
        margin-bottom: 0.25rem;
    }

    .customer-contact {
        font-size: 0.875rem;
        color: #666;
    }

    .customer-stats {
        text-align: right;
        font-size: 0.875rem;
        color: #10B981;
        font-weight: 600;
    }

    /* Form Styles */
    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.25rem;
        margin-bottom: 1.5rem;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .form-group.full-width {
        grid-column: 1 / -1;
    }

    .form-group label {
        font-weight: 600;
        color: #1A1A1A;
        font-size: 0.875rem;
    }

    .form-input,
    .form-select,
    .form-textarea {
        padding: 0.75rem 1rem;
        border: 1px solid #E8E8E8;
        border-radius: 8px;
        font-size: 0.9375rem;
        transition: all 0.2s ease;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
        outline: none;
        border-color: #0033A0;
        box-shadow: 0 0 0 3px rgba(0, 51, 160, 0.1);
    }

    .form-hint {
        font-size: 0.8125rem;
        color: #999;
    }

    /* Walk-in Section */
    .walk-in-section {
        text-align: center;
    }

    .walk-in-icon {
        width: 100px;
        height: 100px;
        background: #F5F5F5;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
    }

    .walk-in-icon i {
        font-size: 3rem;
        color: #999;
    }

    .walk-in-section h3 {
        margin: 0 0 0.5rem 0;
        color: #1A1A1A;
    }

    .walk-in-section p {
        margin: 0 0 2rem 0;
        color: #666;
    }

    /* Buttons */
    .btn-primary,
    .btn-secondary {
        padding: 1rem;
        border: none;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        transition: all 0.2s ease;
    }

    .btn-primary {
        background: #0033A0;
        color: white;
    }

    .btn-primary:hover {
        background: #0047D1;
        transform: translateY(-1px);
    }

    .btn-secondary {
        background: #F5F5F5;
        color: #666;
    }

    .btn-secondary:hover {
        background: #E8E8E8;
        color: #1A1A1A;
    }

    .full-width {
        width: 100%;
    }

    /* Responsive */
    @media (max-width: 640px) {
        .customer-modal {
            width: 100%;
            max-width: 100%;
            max-height: 100%;
            border-radius: 0;
        }

        .form-grid {
            grid-template-columns: 1fr;
        }

        .tab-nav {
            grid-template-columns: 1fr;
        }
    }
</style>

<script>
    function showTab(tabName) {
        // Hide all tabs
        document.querySelectorAll('.tab-content').forEach(tab => {
            tab.classList.remove('active');
        });

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });

        // Show selected tab
        document.getElementById(tabName + 'Tab').classList.add('active');
        event.target.closest('.tab-btn').classList.add('active');
    }

    function selectCustomer(customerId, customerName) {
        // Send selection to server
        fetch('{% url "customers:select_customer" %}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            },
            body: JSON.stringify({
                customer_id: customerId,
                customer_name: customerName
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                closeCustomerModal();
                // Update cart display
                location.reload(); // Or use HTMX to update cart
            }
        });
    }

    function closeCustomerModal() {
        document.getElementById('customerModal').remove();
    }
</script>
